# Configuration for the lychee link checker (auto-discovered by both the
# pre-commit hook and the GitHub Action).

# Don't try to "resolve" mailto: links.
exclude_mail = true

# Treat these HTTP status codes as success.
accept = ["200", "206", "429"]

# Example/placeholder hosts and other URLs that are not meant to resolve.
exclude = [
    "example\\.com",
    "example\\.org",
    "localhost",
    "127\\.0\\.0\\.1",
]
